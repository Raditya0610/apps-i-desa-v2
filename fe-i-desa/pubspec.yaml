name: fe_apps_i_desa
description: Flutter desktop application for Apps I-Desa village management system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^17.0.0

  # HTTP & API
  dio: ^5.4.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Forms & Validation
  flutter_form_builder: ^10.2.0
  form_builder_validators: ^11.2.0

  # Charts
  fl_chart: ^1.1.1

  # UI Components
  forui: ^0.16.0
  cupertino_icons: ^1.0.6

  # Open SIMPOI in the system browser
  url_launcher: ^6.3.1

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.3
  freezed_annotation: ^3.1.0
  json_annotation: ^4.8.1

  # Export
  excel: ^4.0.6
  path_provider: ^2.1.5
  csv: ^6.0.0

  # Import (pick a file for bulk data import)
  file_picker: ^8.1.7

dependency_overrides:
  # path_provider_foundation 2.5.0 and 2.6.0 depend on objective_c, whose native
  # build hook crashes the web build under Flutter 3.44 ("Null check operator used
  # on a null value" in CodeConfig._fromJson — there is no code config for web).
  # 2.5.1 is the newest release without that dependency.
  #
  # Safe to pin: this is the iOS/macOS implementation of path_provider, and we ship
  # Windows and web. Revisit if we ever target Apple platforms.
  path_provider_foundation: 2.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  riverpod_generator: ^2.4.3
  freezed: ^3.1.0
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
